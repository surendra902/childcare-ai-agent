services:
  - type: web
    name: childcare-ai-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./childcare_admin.db
      - key: DEBUG
        value: "true"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: SESSION_EXPIRY_HOURS
        value: "8"
      - key: APPROVAL_TOKEN_EXPIRY_MINUTES
        value: "15"
      - key: RATE_LIMIT_PER_MINUTE
        value: "30"
      - key: OPENROUTER_MODEL
        value: nvidia/nemotron-3-nano-30b-a3b:free
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false  # Must be pasted manually into the Render dashboard (retrieve from your local .env)
      - key: ANTHROPIC_API_KEY
        sync: false  # Must be pasted manually into the Render dashboard (your OpenRouter/Anthropic key)
